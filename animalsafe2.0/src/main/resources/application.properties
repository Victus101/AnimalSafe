# ============================================
# Application Configuration
# ============================================
spring.application.name=animalsafe
server.port=${PORT:8080}

# ============================================
# Database Configuration - MySQL
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/animal_safe?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=lana3045.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Swagger OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-operation-id=true
springdoc.show-actuator=false
# Disable OpenAPI auto-generation resolver issues
springdoc.api-docs.groups.enabled=false
# Simplify the documentation
springdoc.use-management-port=false
springdoc.model-converters.enabled=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.animalsafe20.animalsafe=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=animalsafe-super-secure-key-very-long-123456789-EXTRA-SECURE-KEY-2026-ULTRA
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# Server Configuration
# ============================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
